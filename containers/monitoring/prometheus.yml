scrape_configs:
  - job_name: node
    static_configs:
      - targets: ['192.168.68.16:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['192.168.68.16:8081']

  - job_name: proxmox
    metrics_path: /pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    static_configs:
      - targets: ['192.168.68.16:8006']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.68.16:9221
