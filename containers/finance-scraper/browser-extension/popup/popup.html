<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  body { width: 260px; padding: 14px; font-family: system-ui, sans-serif; font-size: 13px; margin: 0; }
  h3 { margin: 0 0 12px; font-size: 14px; }
  label { display: block; margin-top: 10px; color: #444; }
  input { width: 100%; box-sizing: border-box; margin-top: 4px; padding: 5px 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; }
  button { margin-top: 14px; width: 100%; padding: 7px; background: #2c5f2e; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; }
  button:hover { background: #234d25; }
  #status { margin-top: 8px; font-size: 12px; min-height: 16px; }
  .ok { color: #2c5f2e; }
  .err { color: #c0392b; }
</style>
</head>
<body>
  <h3>Finance Sync</h3>
  <label>Server endpoint
    <input id="endpoint" type="text" placeholder="http://192.168.68.16:9107">
  </label>
  <label>Auth token
    <input id="token" type="password" placeholder="secret token">
  </label>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
