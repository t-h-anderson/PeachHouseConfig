  esphome:
    name: conservatory-cam
    friendly_name: Conservatory Camera
    min_version: 2025.11.0
    name_add_mac_suffix: false
    on_boot:
      priority: -100
      then:
        - lambda: |-
            sensor_t *s = esp_camera_sensor_get();
            if (s != nullptr) {
              s->set_brightness(s, (int)id(cam_brightness).state);
              s->set_ae_level(s, (int)id(cam_ae_level).state);
            }

  esp32:
    board: seeed_xiao_esp32s3
    variant: esp32s3
    framework:
      type: esp-idf

  psram:
    mode: octal
    speed: 80MHz

  logger:
    level: DEBUG
    logs:
      esp32_camera: DEBUG

  api:

  ota:
    - platform: esphome

  safe_mode:
    disabled: true

  wifi:
    ssid: !secret wifi_ssid
    password: !secret wifi_password
    manual_ip:
      static_ip: 192.168.68.66
      gateway: 192.168.68.1
      subnet: 255.255.252.0
    ap:
      ssid: "conservatory-cam-fallback"
      password: "fallback1234"

  captive_portal:

  i2c:
    - id: camera_i2c
      sda: GPIO40
      scl: GPIO39

  esp32_camera:
    name: Conservatory Camera
    external_clock:
      pin: GPIO10
      frequency: 20MHz
    i2c_id: camera_i2c
    data_pins: [GPIO15, GPIO17, GPIO18, GPIO16, GPIO14, GPIO12, GPIO11, GPIO48]
    vsync_pin: GPIO38
    href_pin: GPIO47
    pixel_clock_pin: GPIO13
    frame_buffer_location: PSRAM
    frame_buffer_count: 1
    resolution: 2560X1920
    jpeg_quality: 10
    max_framerate: 2fps
    idle_framerate: 1fps

  esp32_camera_web_server:
    - port: 8080
      mode: stream
    - port: 8081
      mode: snapshot

  number:
    - platform: template
      name: "Camera Brightness"
      id: cam_brightness
      min_value: -2
      max_value: 2
      step: 1
      restore_value: true
      initial_value: 1
      optimistic: true
      set_action:
        - lambda: |-
            sensor_t *s = esp_camera_sensor_get();
            if (s != nullptr) s->set_brightness(s, (int)x);

    - platform: template
      name: "Camera AE Level"
      id: cam_ae_level
      min_value: -2
      max_value: 2
      step: 1
      restore_value: true
      initial_value: 1
      optimistic: true
      set_action:
        - lambda: |-
            sensor_t *s = esp_camera_sensor_get();
            if (s != nullptr) s->set_ae_level(s, (int)x);