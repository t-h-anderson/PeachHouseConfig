- id: '1775747284672'
  alias: Server Power Loss Alert
  description: ''
  triggers:
  - entity_id: sensor.servershelly_power
    below: 10
    for: 00:00:30
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: switch.servershelly
    state: 'on'
  actions:
  - action: notify.signal_tom
    data:
      message: '⚠️ peachhouse: server power draw near 0W — may have crashed'
  mode: single
- alias: Heartbeat
  triggers:
  - trigger: time_pattern
    minutes: /5
  actions:
  - action: rest_command.heartbeat
  mode: single
  id: fc642182c35441faa098c05735a2a750
- alias: Frost Warning
  id: frost_warning_signal
  triggers:
  - trigger: time
    at: '20:00:00'
  actions:
  - action: weather.get_forecasts
    target:
      entity_id: weather.forecast_home
    data:
      type: daily
    response_variable: forecast_data
  - condition: template
    value_template: '{% set fc = forecast_data[''weather.forecast_home''].forecast
      %} {{ fc[0].templow < 1 or fc[1].templow < 1 }}

      '
  - action: notify.signal_tom
    data:
      message: "{% set fc = forecast_data['weather.forecast_home'].forecast %} {%
        set ns = namespace(parts=[]) %} {% for i in range(2) %}\n  {% if fc[i].templow
        < 1 %}\n    {% set label = 'tonight' if i == 0 else 'tomorrow night' %}\n
        \   {% set ns.parts = ns.parts + [label ~ ' (' ~ fc[i].templow | round(1)
        ~ '°C)'] %}\n  {% endif %}\n{% endfor %} \U0001F321️ Frost warning for Waterbeach:
        low below 1°C {{ ns.parts | join(' and ') }}.\n"
  mode: single
