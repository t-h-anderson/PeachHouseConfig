 # Loads default set of integrations. Do not remove.
  default_config:

  frontend:
    themes: !include_dir_merge_named themes

  automation: !include automations.yaml
  script: !include scripts.yaml
  scene: !include scenes.yaml

  http:
    use_x_forwarded_for: true
    trusted_proxies:
      - 192.168.68.16

  rest_command:
    heartbeat:
      url: "https://hc-ping.com/2faacb5c-5c83-4cc1-a8dc-8adc98e3b251"
      method: GET
    open_meteo_forecast:
      url: "https://api.open-meteo.com/v1/forecast?latitude={{ latitude }}&longitude={{ longitude
  }}&current=temperature_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto&forecast_days=1"
      method: GET

  notify:
    - name: signal_tom
      platform: rest
      resource: http://192.168.68.16:8080/v2/send
      method: POST_JSON
      headers:
        Content-Type: application/json
      data:
        number: "+447963511525"
        recipients:
          - "+447963511525"
    - name: signal_nadia
      platform: rest
      resource: http://192.168.68.16:8080/v2/send
      method: POST_JSON
      headers:
        Content-Type: application/json
      data:
        number: "+447963511525"
        recipients:
          - "+447551035656"

  intent_script:
    MorningSummary:
      speech:
        text: "Playing your morning summary."
      action:
        - action: script.morning_summary

  google:
    client_id: !secret google_client_id
    client_secret: !secret google_client_secret

  template:
    - sensor:
        - name: "Living Room Front Radiator Power"
          unique_id: living_room_front_radiator_power
          unit_of_measurement: "W"
          device_class: power
          state_class: measurement
          state: "{{ 1800 if states('climate.living_room_front') == 'heat' else 0 }}"

        - name: "Living Room Rear Radiator Power"
          unique_id: living_room_rear_radiator_power
          unit_of_measurement: "W"
          device_class: power
          state_class: measurement
          state: "{{ 1800 if states('climate.living_room_rear') == 'heat' else 0 }}"

        - name: "Radiators Power"
          unique_id: radiators_power_total
          unit_of_measurement: "W"
          device_class: power
          state_class: measurement
          state: >
            {% set front = 1800 if states('climate.living_room_front') == 'heat' else 0 %}
            {% set rear = 1800 if states('climate.living_room_rear') == 'heat' else 0 %}
            {{ front + rear }}

  sensor:
    - platform: integration
      source: sensor.radiators_power
      name: "Radiators Energy"
      unique_id: radiators_energy_total
      unit_prefix: k
      round: 3
      method: left

  utility_meter:
    server_energy_daily:
      source: sensor.servershelly_energy
      name: "Server Energy Daily"
      cycle: daily
    radiators_energy_daily:
      source: sensor.radiators_energy
      name: "Radiators Energy Daily"
      cycle: daily

  prometheus:
